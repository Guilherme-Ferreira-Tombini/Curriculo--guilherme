<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculo</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <header>
        <div class="bg-dark direction">
            <div>
                <p class="bold-text white-title font-big">Olá!</p>
                <p class="bold-text white-title font-big">Eu sou o Guilherme</p>
                <p class="bold-text white-title font-big">Desenvolvedor <span class="highlight-text">FrontEnd</span></p>
                <div class="config-button">
                    <p class="button-s bg-button-gray bg-light white-title bold-text">O rosto da sua cara</p>
                    <p class="button-o bg-button-orange white-title bold-text">Saiba mais</p>
                </div>
            </div>

            <div class="image-gui-display">
                <img class="image-gui" src="assets/images/guilherme.png" alt="Foto do Guilherme">
            </div>
        </div>

        <div class="bg-light second-header">
            <p class="bold-text white-title font-big-small">Curriculo Portifolio Pessoal</p>
            <section id="social">
                <p class="white-title">Minhas redes sociais</p>
                <div id="menu-social">
                    <a href="#">
                         <img src="assets/images/instagram.png" alt="logo do aplicativo Instagram">
                    </a>

                    <a href="#">
                        <img src="assets/images/facebook.png" alt="logo do aplicativo Facebook">
                    </a>
                       
                    <a href="#">
                        <img src="assets/images/linkedin.png" alt="logo do aplicativo Linkedin">
                    </a>
                </div>
            </section>
        </div>
    </header>

    <main> 

    </main>

    <footer>

    </footer>
</body>
</html>
